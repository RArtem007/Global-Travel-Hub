<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <script src="JS/ui.js"></script>
  <title>Тури — Travel System</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }

    .page-wrap { max-width: 1300px; margin: 0 auto; padding: 1.5rem 1rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: #1a3a5c; margin-bottom: 1.5rem; }

    .top-bar { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 200px; display: flex; gap: 8px; }
    .search-box input { flex: 1; padding: 9px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fff; }
    .btn-blue { background: #2980b9; color: #fff; border: none; padding: 9px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .btn-blue:hover { background: #1f6fa0; }

    .sort-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .sort-wrap label { font-size: 13px; color: #555; white-space: nowrap; }
    .sort-wrap select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: #fff; }

    .per-page-wrap { display: flex; align-items: center; gap: 8px; }
    .per-page-wrap label { font-size: 13px; color: #555; white-space: nowrap; }
    .per-page-wrap select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: #fff; }

    .layout { display: flex; gap: 1.5rem; }
    .sidebar { width: 240px; flex-shrink: 0; }

    .filter-card { background: #fff; border-radius: 10px; padding: 1.2rem; border: 1px solid #e0e0e0; margin-bottom: 1rem; }
    .filter-card h3 { font-size: 13px; font-weight: 700; color: #1a3a5c; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-group { margin-bottom: 1rem; }
    .filter-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .filter-group select,
    .filter-group input[type="text"] { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; background: #fff; }
    .range-row { display: flex; gap: 6px; align-items: center; }
    .range-row input { width: 80px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; background: #fff; text-align: center; }
    .range-row span { color: #999; font-size: 12px; }
    .filter-check { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-check label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #444; cursor: pointer; background: #f5f6fa; padding: 4px 8px; border-radius: 4px; border: 1px solid #e0e0e0; }
    .btn-reset { width: 100%; padding: 8px; border: 1px solid #2980b9; color: #2980b9; background: #fff; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 4px; }
    .btn-reset:hover { background: #eaf4fb; }

    .main { flex: 1; }
    .results-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .results-count { font-size: 13px; color: #666; }
    .results-count b { color: #1a3a5c; }

    .tours-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .tour-card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; transition: box-shadow 0.2s; }
    .tour-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10); }
    .tour-img { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; position: relative; }
    .tour-badge { position: absolute; top: 10px; left: 10px; background: #e74c3c; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
    .tour-badge.popular { background: #f39c12; left: auto; right: 10px; }
    .tour-body { padding: 1rem; }
    .tour-title { font-size: 15px; font-weight: 700; color: #2980b9; margin-bottom: 4px; }
    .tour-sub { font-size: 12px; color: #777; margin-bottom: 6px; }
    .tour-desc { font-size: 12px; color: #666; margin-bottom: 8px; }
    .tour-info { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    .tour-info span { font-size: 12px; color: #555; }
    .rating { color: #f39c12; font-size: 12px; }
    .tour-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
    .tour-price { font-size: 17px; font-weight: 700; color: #1a3a5c; }
    .btn-detail { background: #2980b9; color: #fff; border: none; padding: 7px 14px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    .btn-detail:hover { background: #1f6fa0; }

    .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 2rem; align-items: center; flex-wrap: wrap; }
    .page-btn { padding: 7px 13px; border: 1px solid #ddd; background: #fff; border-radius: 5px; font-size: 13px; cursor: pointer; color: #333; }
    .page-btn:hover, .page-btn.active { background: #2980b9; color: #fff; border-color: #2980b9; }
    .page-btn:disabled {cursor: default; }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>

<div id="header"></div>
<script src="JS/app.js"></script>


<div class="page-wrap">
  <div class="page-title">Тури</div>

  <div class="top-bar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Пошук турів..." oninput="filterTours()">
      <button class="btn-blue" onclick="filterTours()">Знайти</button>
    </div>
    <div class="sort-wrap">
      <label>Сортувати:</label>
      <select id="sortSelect" onchange="filterTours()">
        <option value="price_asc">Ціна ↑</option>
        <option value="price_desc">Ціна ↓</option>
        <option value="rating">Рейтинг</option>
        <option value="popularity">Популярність</option>
        <option value="date">Дата</option>
      </select>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="filter-card">
        <h3>Фільтри</h3>

        <div class="filter-group">
          <label>Країна / місто</label>
          <select id="fCountry" onchange="filterTours()">
            <option value="">Всі</option>
            <option>Франція</option>
            <option>Італія</option>
            <option>Іспанія</option>
            <option>Греція</option>
            <option>Туреччина</option>
            <option>Єгипет</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Тип туру</label>
          <select id="fType" onchange="filterTours()">
            <option value="">Всі типи</option>
            <option>Пляжний</option>
            <option>Екскурсійний</option>
            <option>Гірський</option>
            <option>Круїз</option>
            <option>Оздоровчий</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Ціна (€)</label>
          <div class="range-row">
            <input type="text" id="priceMin" placeholder="від" oninput="filterTours()">
            <span>—</span>
            <input type="text" id="priceMax" placeholder="до" oninput="filterTours()">
          </div>
        </div>

        <div class="filter-group">
          <label>Тривалість (днів)</label>
          <div class="range-row">
            <input type="text" id="durMin" placeholder="від" oninput="filterTours()">
            <span>—</span>
            <input type="text" id="durMax" placeholder="до" oninput="filterTours()">
          </div>
        </div>

        <div class="filter-group">
          <label>Дата виїзду</label>
          <input type="text" id="fDate" placeholder="дд.мм.рррр">
        </div>

        <button class="btn-reset" onclick="resetFilters()">↺ Скинути фільтри</button>
      </div>
    </div>

    <div class="main">
      <div class="results-bar">
        <div class="results-count">Знайдено: <b id="countDisplay">0</b> турів</div>
      </div>
      <div class="tours-grid" id="toursGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<div id="footer"></div>
<script>
fetch('footer.html').then(r=>r.text()).then(t=>document.getElementById('footer').innerHTML=t);
</script>

<script type="module">
// ===== ЗМІНЕНО: імпорт Supabase замість fetch('ID.json') =====
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabase = createClient(
  'https://njzygyuxisnstpydadsz.supabase.co',
  'sb_publishable_1YigaD3BnGQohHM8ly-peA_yB-0oYbG'
);
// ===== КІНЕЦЬ ЗМІН =====

let TOURS = [];
let currentPage = 1;

function gradientFor(type) {
  const map = {
    'Пляжний':      'linear-gradient(135deg,#74d7c4,#0f9b8e)',
    'Екскурсійний': 'linear-gradient(135deg,#74aee8,#1a6b9a)',
    'Гірський':     'linear-gradient(135deg,#a8c5a0,#4a7c5e)',
    'Круїз':        'linear-gradient(135deg,#6ab3e8,#1565c0)',
    'Оздоровчий':   'linear-gradient(135deg,#c5a0c5,#7b4f9e)',
  };
  return map[type] || 'linear-gradient(135deg,#74aee8,#1a6b9a)';
}

// ===== ЗМІНЕНО: async функція що тягне дані з Supabase =====
async function loadTours() {
  showLoading('toursGrid');
  const { data, error } = await supabase.from('tours').select('*');
  if (error) { showError('toursGrid'); return; }
  if (!data.length) { showEmpty('toursGrid', 'Турів не знайдено'); return; }

  TOURS = data;
  filterTours();

}
// ===== КІНЕЦЬ ЗМІН =====

window.filterTours = function() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const country = document.getElementById('fCountry').value;
  const type = document.getElementById('fType').value;
  const pMin = parseFloat(document.getElementById('priceMin').value) || 0;
  const pMax = parseFloat(document.getElementById('priceMax').value) || 99999;
  const dMin = parseFloat(document.getElementById('durMin').value) || 0;
  const dMax = parseFloat(document.getElementById('durMax').value) || 99;
  const sort = document.getElementById('sortSelect').value;
  const per = 12;

  let res = TOURS.filter(t => {
    if (q && !t.name.toLowerCase().includes(q) && !t.country.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q)) return false;
    if (country && t.country !== country) return false;
    if (type && t.type !== type) return false;
    if (t.price < pMin || t.price > pMax) return false;
    if (t.days < dMin || t.days > dMax) return false;
    return true;
  });

  if (sort === 'price_asc')       res.sort((a,b) => a.price - b.price);
  else if (sort === 'price_desc') res.sort((a,b) => b.price - a.price);
  else if (sort === 'rating')     res.sort((a,b) => b.rating - a.rating);
  else if (sort === 'popularity') res.sort((a,b) => b.reviews - a.reviews);
  else if (sort === 'date')       res.sort((a,b) => new Date(a.date) - new Date(b.date));

  document.getElementById('countDisplay').textContent = res.length;

  const pages = Math.ceil(res.length / per) || 1;
  if (currentPage > pages) currentPage = 1;
  const slice = res.slice((currentPage - 1) * per, currentPage * per);

  document.getElementById('toursGrid').innerHTML = slice.map(t => `
    <div class="tour-card">
      <div class="tour-img" style="background:${gradientFor(t.type)}">
        <!-- ===== ЗМІНЕНО: t.emoji → t.image (назва колонки в Supabase) ===== -->
        <span>${t.image || ''}</span>
      </div>
      <div class="tour-body">
        <div class="tour-title">${t.name}</div>
        <div class="tour-sub">${t.days} днів · ${t.country} · ${t.type}</div>
        <div class="tour-desc">${t.desc}</div>
        <div class="tour-footer">
          <div class="tour-price">${t.price}€</div>
          <button class="btn-detail" onclick="window.location.href='tour.html?id=${t.id}'">Детальніше →</button>
        </div>
      </div>
    </div>
  `).join('');

  renderPagination(pages);
}

function renderPagination(pages) {
  const p = document.getElementById('pagination');
  if (pages <= 1) { p.innerHTML = ''; return; }
  let h = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Попередня</button>`;
  for (let i = 1; i <= pages; i++) {
    if (pages > 7 && i > 2 && i < pages - 1 && Math.abs(i - currentPage) > 1) {
      if (i === 3 || i === pages - 2) h += '<span style="padding:0 4px;color:#999">...</span>';
      continue;
    }
    h += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  h += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>Наступна →</button>`;
  p.innerHTML = h;
}

window.goPage = function(n) { currentPage = n; filterTours(); window.scrollTo(0, 0); }

window.resetFilters = function() {
  document.getElementById('searchInput').value = '';
  document.getElementById('fCountry').value = '';
  document.getElementById('fType').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.getElementById('durMin').value = '';
  document.getElementById('durMax').value = '';
  document.getElementById('fDate').value = '';
  currentPage = 1;
  filterTours();
}

// ===== ЗМІНЕНО: loadTours() замість filterTours() — спочатку тягнемо дані =====
loadTours();
// ===== КІНЕЦЬ ЗМІН =====
</script>

</body>
</html>

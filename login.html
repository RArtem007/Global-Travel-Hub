<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>

    <style>

        /* ===== СТОРІНКА (ФОН І ЦЕНТРУВАННЯ) ===== */
        body {
            font-family: Arial, sans-serif; /* Шрифт */
            background: #f4f6f8; /* Колір фону сторінки */
    
            display: flex; /* Включає flexbox */
            justify-content: center; /* Центрує по горизонталі */
            align-items: center; /* Центрує по вертикалі */
    
            height: 100vh; /* Висота на весь екран */
            margin: 0; /* Прибирає стандартні відступи */
        }


        /* ===== БІЛИЙ БЛОК (ФОРМА) ===== */
        .box {
            background: white; /* Колір картки */
            padding: 30px; /* Внутрішні відступи */
            border-radius: 12px; /* Закруглення кутів */
    
            width: 320px; /* Ширина форми */
    
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); /* Тінь */
    
            text-align: center; /* Вирівнює текст по центру */
}


        /* ===== ЗАГОЛОВОК ===== */
        h2 {
            margin-bottom: 20px; /* Відступ вниз */
        }


        /* ===== ПОЛЯ ВВОДУ (EMAIL / ПАРОЛЬ) ===== */
        input {
            width: 100%; /* На всю ширину контейнера */
    
            padding: 12px; /* Внутрішній відступ */
            margin-bottom: 15px; /* Відступ між полями */
    
            border-radius: 6px; /* Закруглення */
            border: 1px solid #ccc; /* Колір рамки */
    
            font-size: 14px; /* Розмір тексту */
    
            box-sizing: border-box; 
            /* ВАЖЛИВО: щоб padding не ламав ширину */
        }


        /* ===== КНОПКА ===== */
        button {
            width: 100%; /* Ширина як у інпутів */
    
            padding: 12px; /* Розмір кнопки */
    
            background: #3498db; /* Колір кнопки */
            color: white; /* Колір тексту */
    
            border: none; /* Без рамки */
            border-radius: 6px; /* Закруглення */
    
            font-size: 16px; /* Розмір тексту */
    
            cursor: pointer; /* Курсор рукою */
        }


        /* ===== ЕФЕКТ ПРИ НАВЕДЕННІ ===== */
        button:hover {
            background: #2980b9; /* Темніша кнопка */
        }


        /* ===== БЛОК З ПОСИЛАННЯМИ ===== */
        .links {
            margin-top: 15px; /* Відступ зверху */
        }


        /* ===== ПОСИЛАННЯ (РЕЄСТРАЦІЯ / ЗАБУЛИ ПАРОЛЬ) ===== */
        .links a {
            display: block; /* Кожне з нового рядка */
    
            margin-top: 8px; /* Відступ між ними */
    
            color: #3498db; /* Колір тексту */
            text-decoration: none; /* Без підкреслення */
    
            font-size: 14px; /* Розмір тексту */
        }


        /* ===== ЕФЕКТ НАВЕДЕННЯ НА ПОСИЛАННЯ ===== */
        .links a:hover {
            text-decoration: underline; /* Підкреслення при наведенні */
        }

</style>
</head>

<body>

<div class="box">

    <h2 id="title">Вхід</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">

    <button onclick="login()">Увійти</button>

    <div class="links">
        <a onclick="showRegister()">Реєстрація</a>
        <a onclick="forgotPassword()">Забули пароль?</a>
    </div>

</div>

<script>

let isRegister = false;

function showRegister() {
    document.getElementById("title").innerText = "Реєстрація";
    document.querySelector("button").innerText = "Зареєструватися";
    isRegister = true;
}

function login() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Заповніть всі поля!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if (isRegister) {
        // перевірка чи користувач існує
        let exists = users.find(u => u.email === email);

        if (exists) {
            alert("Користувач вже існує!");
            return;
        }

        users.push({ email, password });
        localStorage.setItem("users", JSON.stringify(users));

        alert("Реєстрація успішна!");
        isRegister = false;
        location.reload();

    } else {
        let user = users.find(u => u.email === email && u.password === password);

        if (user) {
            alert("Вхід успішний!");
            localStorage.setItem("currentUser", email);
            window.location.href = "index.html"; // повернення на головну
        } else {
            alert("Невірний email або пароль!");
        }
    }
}

function forgotPassword() {
    let email = prompt("Введіть ваш email:");

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.email === email);

    if (user) {
        alert("Ваш пароль: " + user.password);
    } else {
        alert("Користувача не знайдено");
    }
}

</script>

</body>
</html>

<link rel="stylesheet" href="style.css">

<style>
    /* Загальні стилі */
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        background-color: #f4f6f8;
        color: #333;
    }

    /* Стиль хедера */
    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(90deg, #3498db, #2c3e50);
        color: white;
        padding: 15px 30px;
        position: relative; 
    }

    .logo {
        width: 80px;
        margin-right: 20px;
    }

    header h1 {
        margin: 0;
        font-size: 28px;
    }

    /* Меню навігації */
    nav a {
        margin: 0 15px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    nav a:hover {
        color: #f1c40f;
    }

    /* Контейнер сторінки */
    .container {
        max-width: 1000px;
        margin: auto;
        padding: 30px;
    }

    h2 {
        color: #2c3e50;
    }

    /* Стиль для кнопки входу */
    .login-btn {
        color: white;
        font-weight: bold;
        text-decoration: none;
        padding: 10px 20px;
        background-color: #3498db;
        border-radius: 5px;
        transition: 0.3s;
        margin-left: 30px;
    }

    .login-btn:hover {
        background-color: #2980b9;
    }

    /* Клас для активного посилання */
    .active {
        
        color: #d39000;
        
    }

    /* Десктоп — бургер прихований, nav видимий */
    @media (min-width: 769px) {
        .burger { display: none; }
        nav { display: flex; align-items: center; }
    }


</style>

<header>
    <div style="display: flex; align-items: center;">
        <img src="Photo/logo.png" alt="Логотип" class="logo">
        <h1>Travel System</h1>
    </div>

    <div class="burger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    
    <nav id="mainNav">
        <a href="index.html" >Головна</a>
        <a href="tours.html">Тури</a>
        <a href="b.html">Про нас</a>
        <a href="contacts.html">Контакти</a>

        <a href="admin.html" id="adminBtn" style="display:none; color:white; font-weight:bold; text-decoration:none; padding:10px 20px; background:#e67e22; border-radius:5px; margin-left:8px;">⚙️ Адмін</a>
        <a href="login.html" class="login-btn" id="authBtn">Увійти</a>
    </nav>
</header>



<script>
document.addEventListener("DOMContentLoaded", function() {
    // ===== Кнопка входу / користувач =====
    const user = localStorage.getItem("currentUser");
    const btn = document.getElementById("authBtn");

    if (user) {
        btn.innerText = "👤 " + user;
        btn.href = "#";

        btn.onclick = function() {
            if (confirm("Вийти з акаунту?")) {
                localStorage.removeItem("currentUser");
                location.reload();
            }
        }

        // Перевірка на адмінку
        if (typeof isAdmin !== "undefined" && isAdmin) {
            const adminBtn = document.getElementById("adminBtn");
            if (adminBtn) adminBtn.style.display = "inline-block";
        }
    }

    // ===== Підсвітка активної сторінки =====
    let currentPage = window.location.pathname.split("/").pop().toLowerCase();
    if (!currentPage || currentPage === "") currentPage = "index.html";

    const links = document.querySelectorAll("nav a");

    links.forEach(link => {
        let linkPage = link.getAttribute("href").split("/").pop().toLowerCase();
        link.classList.remove("active");
        if (linkPage === currentPage) {
            link.classList.add("active");
        }
    });
});

// ===== Функція для бургер-меню =====
function toggleMenu() {
    document.getElementById('mainNav').classList.toggle('open');
}
</script>
